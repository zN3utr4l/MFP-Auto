services:
  - type: web
    name: mfp-auto-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    plan: free
    disk:
      name: mfp-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.14.3"
